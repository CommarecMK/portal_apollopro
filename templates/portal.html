<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rozcestník — Superskladník</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .hlavicka {
      text-align: center;
      margin-bottom: 3rem;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.75rem;
    }

    .pozdrav {
      font-size: 2rem;
      font-weight: 300;
      color: #f0f0f0;
    }

    .pozdrav span {
      font-weight: 600;
      color: #fff;
    }

    /* Mřížka dlaždic */
    .dlazdicove-pole {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
      width: 100%;
      max-width: 720px;
    }

    .dlazdicova-karta {
      display: block;
      text-decoration: none;
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 2rem;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      cursor: pointer;
    }

    .dlazdicova-karta:hover {
      transform: translateY(-3px);
      border-color: #3a3d50;
      background: #1e2133;
    }

    .dlazdicova-karta:active {
      transform: translateY(0);
    }

    /* Ikona dlaždice */
    .ikona-obal {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      font-size: 1.5rem;
    }

    .ikona-obal.modra  { background: rgba(59, 130, 246, 0.15); }
    .ikona-obal.zelena { background: rgba(34, 197, 94, 0.12); }
    .ikona-obal.oranzova { background: rgba(249, 115, 22, 0.12); }
    .ikona-obal.fialova { background: rgba(168, 85, 247, 0.12); }

    /* SVG ikony */
    .ikona-svg {
      width: 26px;
      height: 26px;
    }
    .modra  .ikona-svg { color: #3b82f6; }
    .zelena .ikona-svg { color: #22c55e; }
    .oranzova .ikona-svg { color: #f97316; }
    .fialova .ikona-svg { color: #a855f7; }

    .nazev-aplikace {
      font-size: 1.125rem;
      font-weight: 600;
      color: #f0f0f0;
      margin-bottom: 0.4rem;
    }

    .popis-aplikace {
      font-size: 0.85rem;
      color: #666;
      line-height: 1.5;
    }

    .sipka {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .modra  .sipka { color: #3b82f6; }
    .zelena .sipka { color: #22c55e; }
    .oranzova .sipka { color: #f97316; }
    .fialova .sipka { color: #a855f7; }

    .dlazdicova-karta:hover .sipka { opacity: 1; }

    /* Patička */
    .paticka {
      margin-top: 3rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      font-size: 0.8rem;
      color: #444;
    }

    .paticka a {
      color: #555;
      text-decoration: none;
      transition: color 0.15s;
    }

    .paticka a:hover { color: #888; }

    .oddelovac { color: #2a2d3a; }
  </style>
</head>
<body>

  <div class="hlavicka">
    <div class="logo">Superskladník</div>
    <div class="pozdrav">Vítej, <span>{{ current_user.name }}</span></div>
  </div>

  <div class="dlazdicove-pole">
    {% for app in aplikace %}
    <a href="{{ app.url }}" class="dlazdicova-karta">

      <div class="ikona-obal {{ app.barva }}">
        {% if app.ikona == "crm" %}
        <!-- Ikona CRM: stavební bloky / briefcase -->
        <svg class="ikona-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
        </svg>
        {% elif app.ikona == "kb" %}
        <!-- Ikona KB: kniha / databáze -->
        <svg class="ikona-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        {% else %}
        <!-- Výchozí ikona -->
        <svg class="ikona-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        {% endif %}
      </div>

      <div class="nazev-aplikace">{{ app.nazev }}</div>
      <div class="popis-aplikace">{{ app.popis }}</div>

      <div class="sipka {{ app.barva }}">
        Otevřít aplikaci
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </div>

    </a>
    {% endfor %}
  </div>

  <div class="paticka">
    <span>{{ current_user.email }}</span>
    <span class="oddelovac">·</span>
    <a href="{{ url_for('main.logout') }}">Odhlásit se</a>
  </div>

</body>
</html>
