<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Přihlášení — Apollo Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: #0E213E;
}
.bg { position: fixed; inset: 0; background: #0E213E; }
.bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); }
.bg-orb-1 { width: 700px; height: 700px; background: radial-gradient(circle, rgba(23,55,103,0.9) 0%, transparent 70%); top: -200px; left: -150px; }
.bg-orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(5,11,21,1) 0%, transparent 60%); top: 20%; left: 30%; }
.bg-orb-3 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(37,79,138,0.6) 0%, transparent 70%); bottom: -100px; right: -100px; }
.login-wrap { position: relative; z-index: 10; width: 100%; max-width: 420px; padding: 0 20px; }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo-name { font-size: 28px; font-weight: 900; color: white; letter-spacing: 0.08em; text-transform: uppercase; }
.login-logo-tagline { margin-top: 8px; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.25); letter-spacing: 0.15em; text-transform: uppercase; }
.login-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-top: 3px solid #00AFF0;
  border-radius: 8px;
  padding: 36px 32px;
  backdrop-filter: blur(20px);
}
.login-title { font-size: 28px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.login-sub { font-size: 11px; color: rgba(255,255,255,0.35); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 28px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.form-group input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 5px; padding: 11px 14px; font-family: 'Montserrat', sans-serif; font-size: 13px; color: white; outline: none; transition: border-color 0.2s; }
.form-group input::placeholder { color: rgba(255,255,255,0.2); }
.form-group input:focus { border-color: #00AFF0; }
.btn-login { width: 100%; background: #00AFF0; color: #0E213E; border: none; border-radius: 5px; padding: 13px; font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
.btn-login:hover { background: #008ABD; }
.alert-error { background: rgba(192,57,43,0.2); border: 1px solid rgba(192,57,43,0.4); border-radius: 5px; padding: 10px 14px; font-size: 12px; color: #ff8a7a; margin-bottom: 16px; font-weight: 500; }
.login-footer { text-align: center; margin-top: 20px; font-size: 10px; color: rgba(255,255,255,0.2); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="bg">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>
<div class="login-wrap">
  <div class="login-logo">
    <div class="login-logo-name">Apollo Pro</div>
    <div class="login-logo-tagline">Firemní portál</div>
  </div>
  <div class="login-card">
    <div class="login-title">Přihlášení</div>
    <div class="login-sub">Interní systém Commarec</div>
    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" placeholder="vas@email.cz" required autofocus>
      </div>
      <div class="form-group">
        <label>Heslo</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Přihlásit se →</button>
    </form>
  </div>
  <div class="login-footer">Commarec s.r.o. &nbsp;·&nbsp; Interní nástroj</div>
</div>
</body>
</html>
